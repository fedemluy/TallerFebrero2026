---
- hosts: nfs01
  become: true

  tasks:
  
  - name: install service nfs utils
    ansible.builtin.dnf:
      name: nfs-utils
      state: present

  - name: create shared diretory
    ansible.builtin.file:
      path: /srv/nfs/shared
      state: directory
      owner: nobody
      mode: '0777'

  - name: export shared directory
    ansible.builtin.lineinfile:
      path: /etc/exports
      line: "/srv/nfs/shared	192.168.10.0/24(rw)"
      state: present

  - name: service NFS is started
    ansible.builtin.systemd_service:
      name: nfs-server
      state: started
      enabled: true


  - name: NFS enable in firewalld
    ansible.posix.firewalld:
      service: nfs
      state: enabled
      permanent: true
      immediate: true
      


